<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>English SRS - 英語学習アプリ</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f1419">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="English SRS">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root{
    --bg:#0f1419; --surface:#1a2029; --surface2:#232b36; --border:#2e3743;
    --text:#e6edf3; --muted:#8b97a6; --accent:#4f9cf9; --accent2:#36c5a0;
    --again:#e5534b; --hard:#d8923b; --good:#3fa45b; --easy:#4f9cf9;
    --radius:14px; --shadow:0 6px 24px rgba(0,0,0,.35);
  }
  :root[data-theme=light]{
    --bg:#f4f6f9; --surface:#ffffff; --surface2:#eef1f5; --border:#d8dee6;
    --text:#1a2029; --muted:#5a6572; --accent:#2f7de0; --accent2:#1f9d80;
    --shadow:0 6px 24px rgba(0,0,0,.10);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body,.card,.panel,.stat-card,.nav-btn,.btn{transition:background .2s,color .2s,border-color .2s}
  html,body{margin:0;height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
    background:var(--bg); color:var(--text); line-height:1.6;
    display:flex; flex-direction:column; min-height:100vh;
    padding-bottom:env(safe-area-inset-bottom, 0px);
  }
  header{
    padding:14px 18px;
    padding-top:calc(14px + env(safe-area-inset-top, 0px));
    padding-left:calc(18px + env(safe-area-inset-left, 0px));
    padding-right:calc(18px + env(safe-area-inset-right, 0px));
    background:var(--surface); border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:12px; position:sticky; top:0; z-index:10;
  }
  header h1{font-size:17px; margin:0; font-weight:700; letter-spacing:.2px}
  header .spacer{flex:1}
  .nav-btn{
    background:transparent; border:1px solid var(--border); color:var(--muted);
    padding:7px 12px; border-radius:10px; font-size:13px; cursor:pointer; transition:.15s;
  }
  .nav-btn:hover{color:var(--text); border-color:var(--accent)}
  .nav-btn.active{color:#fff; background:var(--accent); border-color:var(--accent)}
  main{flex:1; width:100%; max-width:680px; margin:0 auto; padding:20px 16px 40px}
  .view{display:none; animation:fade .25s ease}
  .view.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  /* Dashboard */
  .stat-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:22px}
  .stat-card{
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    padding:18px 14px; text-align:center;
  }
  .stat-card .num{font-size:30px; font-weight:800; color:var(--accent)}
  .stat-card .lbl{font-size:12px; color:var(--muted); margin-top:4px}
  .stat-card.due .num{color:var(--accent2)}
  .panel{
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    padding:20px; margin-bottom:16px;
  }
  .panel h2{font-size:15px; margin:0 0 12px}
  .bar{height:10px; border-radius:6px; background:var(--surface2); overflow:hidden; margin:8px 0}
  .bar>span{display:block; height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2))}
  .tag-row{display:flex; flex-wrap:wrap; gap:8px; margin-top:10px}
  .chip{font-size:12px; padding:5px 10px; border-radius:20px; background:var(--surface2); color:var(--muted)}
  .primary{
    width:100%; padding:16px; font-size:16px; font-weight:700; color:#fff; border:none;
    border-radius:var(--radius); background:linear-gradient(135deg,var(--accent),#3a7fd0);
    cursor:pointer; box-shadow:var(--shadow); transition:.15s; margin-top:6px;
  }
  .primary:hover{filter:brightness(1.08)}
  .primary:disabled{opacity:.4; cursor:not-allowed}

  /* Study */
  .progress-line{font-size:13px; color:var(--muted); margin-bottom:14px; text-align:center}
  .card{
    background:var(--surface); border:1px solid var(--border); border-radius:18px;
    min-height:260px; padding:30px 24px; display:flex; flex-direction:column;
    justify-content:center; align-items:center; text-align:center; box-shadow:var(--shadow);
    cursor:pointer; position:relative;
  }
  .card .badge{position:absolute; top:14px; right:14px; font-size:11px; color:var(--muted);
    background:var(--surface2); padding:4px 9px; border-radius:12px}
  .card .front{font-size:27px; font-weight:700}
  .card .divider{width:60%; height:1px; background:var(--border); margin:20px 0}
  .card .back{font-size:21px; color:var(--accent2); font-weight:600}
  .card .example{font-size:15px; color:var(--muted); margin-top:14px; font-style:italic}
  .card .src{font-size:12px; color:var(--muted); margin-top:16px}
  .hint{font-size:13px; color:var(--muted); margin-top:18px}
  .rate-row{display:grid; grid-template-columns:repeat(4,1fr); gap:9px; margin-top:18px}
  .rate{padding:14px 6px; border:none; border-radius:12px; color:#fff; font-size:14px;
    font-weight:700; cursor:pointer; transition:.15s}
  .rate small{display:block; font-size:11px; font-weight:400; opacity:.85; margin-top:3px}
  .rate:hover{filter:brightness(1.1); transform:translateY(-1px)}
  .rate.again{background:var(--again)} .rate.hard{background:var(--hard)}
  .rate.good{background:var(--good)} .rate.easy{background:var(--easy)}
  .done-box{text-align:center; padding:40px 20px}
  .done-box .emoji{font-size:52px}

  /* Manage */
  .toolbar{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px}
  .btn{padding:10px 14px; border:1px solid var(--border); background:var(--surface2);
    color:var(--text); border-radius:10px; font-size:13px; cursor:pointer}
  .btn:hover{border-color:var(--accent)}
  .btn.danger:hover{border-color:var(--again); color:var(--again)}
  table{width:100%; border-collapse:collapse; font-size:13px}
  th,td{text-align:left; padding:9px 8px; border-bottom:1px solid var(--border); vertical-align:top}
  th{color:var(--muted); font-weight:600; position:sticky; top:0; background:var(--surface)}
  .list-wrap{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    max-height:60vh; overflow:auto}
  .mini-chip{font-size:10px; padding:2px 7px; border-radius:10px; background:var(--surface2); color:var(--muted)}
  .empty{color:var(--muted); text-align:center; padding:40px 20px}
  footer{text-align:center; font-size:11px; color:var(--muted); padding:14px}
  input[type=file]{display:none}
  kbd{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:2px 7px;font-size:12px;font-family:monospace}
  @media(max-width:480px){
    .stat-card .num{font-size:24px}
    .card .front{font-size:23px}
  }
</style>
</head>
<body>
<header>
  <h1>📚 English SRS</h1>
  <div class="spacer"></div>
  <button class="nav-btn active" data-view="dashboard">ホーム</button>
  <button class="nav-btn" data-view="study">学習</button>
  <button class="nav-btn" data-view="manage">デッキ</button>
  <button class="nav-btn" data-view="settings">設定</button>
</header>

<main>
  <!-- DASHBOARD -->
  <section id="dashboard" class="view active">
    <div class="stat-grid">
      <div class="stat-card due"><div class="num" id="s-due">0</div><div class="lbl">今日の復習</div></div>
      <div class="stat-card"><div class="num" id="s-total">0</div><div class="lbl">総カード数</div></div>
      <div class="stat-card"><div class="num" id="s-mastered">0</div><div class="lbl">定着</div></div>
    </div>
    <div class="panel">
      <h2>定着率</h2>
      <div class="bar"><span id="mastery-bar" style="width:0%"></span></div>
      <div style="font-size:13px;color:var(--muted)" id="mastery-text">—</div>
      <div class="tag-row" id="tag-breakdown"></div>
    </div>
    <button class="primary" id="start-btn">学習を始める</button>
    <div class="panel" id="no-data-panel" style="display:none;margin-top:16px">
      <h2>はじめに</h2>
      <p style="font-size:14px;color:var(--muted);margin:0 0 12px">
        カードが読み込まれていません。レッスンから生成した <code>cards.json</code> を取り込んでください。
      </p>
      <button class="btn" id="import-btn2">cards.json を取り込む</button>
    </div>
  </section>

  <!-- STUDY -->
  <section id="study" class="view">
    <div class="progress-line" id="study-progress">—</div>
    <div id="study-area"></div>
  </section>

  <!-- MANAGE -->
  <section id="manage" class="view">
    <div class="toolbar">
      <button class="btn" id="import-btn">📥 cards.json 取り込み</button>
      <button class="btn" id="export-btn">📤 エクスポート</button>
      <button class="btn danger" id="reset-btn">🗑 進捗リセット</button>
      <input type="file" id="file-input" accept=".json,application/json">
    </div>
    <div class="list-wrap">
      <table>
        <thead><tr><th>表 (front)</th><th>裏 (back)</th><th>次回</th><th></th></tr></thead>
        <tbody id="card-list"></tbody>
      </table>
      <div class="empty" id="list-empty" style="display:none">カードがありません</div>
    </div>
  </section>

  <!-- SETTINGS -->
  <section id="settings" class="view">
    <div class="panel">
      <h2>学習量の上限</h2>
      <label style="display:flex;justify-content:space-between;align-items:center;margin:10px 0;font-size:14px">
        1日の新規カード上限
        <input type="number" id="set-new" min="0" max="200" style="width:90px;padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text)">
      </label>
      <label style="display:flex;justify-content:space-between;align-items:center;margin:10px 0;font-size:14px">
        1日の復習上限
        <input type="number" id="set-review" min="0" max="500" style="width:90px;padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text)">
      </label>
      <p style="font-size:12px;color:var(--muted);margin:6px 0 0">0 を指定すると無制限になります。</p>
    </div>
    <div class="panel">
      <h2>表示</h2>
      <label style="display:flex;justify-content:space-between;align-items:center;margin:4px 0;font-size:14px">
        テーマ
        <select id="set-theme" style="padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text)">
          <option value="dark">ダーク</option>
          <option value="light">ライト</option>
        </select>
      </label>
    </div>
    <div class="panel">
      <h2>キーボード操作 (PC)</h2>
      <div style="font-size:13px;color:var(--muted);line-height:2">
        <kbd>Space</kbd> / <kbd>Enter</kbd> … 答えを表示<br>
        <kbd>1</kbd> Again · <kbd>2</kbd> Hard · <kbd>3</kbd> Good · <kbd>4</kbd> Easy
      </div>
    </div>
  </section>
</main>
<footer>English SRS · ローカル動作 · データは端末内に保存されます</footer>

 node Ranch discussion", "tags": ["transcript", "business"], "id": "3212f5f463ed", "srs": {"easeFactor": 2.5, "interval": 0, "repetitions": 0, "dueDate": "2026-06-30"}, "date": null, "teacher": null}, {"front": "MBR", "back": "Monthly Business Review - 月次ビジネスレビュー", "example": "MBR deck updated with capacity metrics and inventory status", "source": "done_2026-04-15_1on1_Asmer", "tags": ["transcript", "business"], "id": "e4c5a79f94c6", "srs": {"easeFactor": 2.5, "interval": 0, "repetitions": 0, "dueDate": "2026-06-30"}, "date": null, "teacher": null}, {"front": "WBR", "back": "Weekly Business Review - 週次ビジネスレビュー", "example": "WBR slides with SAP metrics for international reporting", "source": "done_2026-05-19 1on1 Dan_SAP related", "tags": ["transcript", "business"], "id": "b48f3ea6e4f4", "srs": {"easeFactor": 2.5, "interval": 0, "repetitions": 0, "dueDate": "2026-06-30"}, "date": null, "teacher": null}, {"front": "ISM", "back": "Inventory Supply Management - 在庫供給管理", "example": "ISM team working on SAP ASIN onboarding gradually", "source": "done_2026-05-19 1on1 Dan_SAP related", "tags": ["transcript", "business"], "id": "4b84c266f8d8", "srs": {"easeFactor": 2.5, "interval": 0, "repetitions": 0, "dueDate": "2026-06-30"}, "date": null, "teacher": null}, {"front": "UTR", "back": "Unit Throughput Rate - ユニット処理率", "example": "UTR quality metrics showing defect rates at different DCs", "source": "done_2026-04-15_1on1_Asmer", "tags": ["transcript", "business"], "id": "a4d9c9124d10", "srs": {"easeFactor": 2.5, "interval": 0, "repetitions": 0, "dueDate": "2026-06-30"}, "date": null, "teacher": null}, {"front": "onboarding", "back": "オンボーディング - 新規導入・立ち上げ", "example": "selection onboarding process with standardized criteria and timeline", "source": "done_2026-04-15_1on1_Asmer", "tags": ["transcript", "business"], "id": "5dac94ca6635", "srs": {"easeFactor": 2.5, "interval": 0, "repetitions": 0, "dueDate": "2026-06-30"}, "date": null, "teacher": null}, {"front": "offboarding", "back": "オフボーディング - 撤退・削除", "example": "selection offboarding mechanism to remove slow-moving items", "source": "done_20260306_SC Friday team meeting", "tags": ["transcript", "business"], "id": "6b6f79d90afa", "srs": {"easeFactor": 2.5, "interval": 0, "repetitions": 0, "dueDate": "2026-06-30"}, "date": null, "teacher": null}, {"front": "days of cover", "back": "Days of Cover - 在庫日数", "example": "days of cover calculation for optimal inventory level management", "source": "done_2026-04-15_1on1_Asmer", "tags": ["transcript", "business"], "id": "600ab2b429d6", "srs": {"easeFactor": 2.5, "interval": 0, "repetitions": 0, "dueDate": "2026-06-30"}, "date": null, "teacher": null}, {"front": "capacity subgroup", "back": "キャパシティ サブグループ - 倉庫の領域分類", "example": "capacity subgroup mapping for SAP bin locations in ILS system", "source": "done_2026-05-19 1on1 Dan_SAP related", "tags": ["transcript", "business"], "id": "f549baf19fd9", "srs": {"easeFactor": 2.5, "interval": 0, "repetitions": 0, "dueDate": "2026-06-30"}, "date": null, "teacher": null}, {"front": "validate against", "back": "〜に対して検証する", "example": "validate against benchmark data from UK operations", "source": "done_20260303_Monday_prioritization_Nik", "tags": ["transcript", "phrasal"], "id": "2963315db245", "srs": {"easeFactor": 2.5, "interval": 0, "repetitions": 0, "dueDate": "2026-06-30"}, "date": null, "teacher": null}, {"front": "end to end", "back": "エンドツーエンド - 全体的に・プロセス全体で", "example": "think end to end from selection onboarding to removal", "source": "done_20260315_Malou", "tags": ["transcript", "idiom"], "id": "f0f596a088f9", "srs": {"easeFactor": 2.5, "interval": 0, "repetitions": 0, "dueDate": "2026-06-30"}, "date": null, "teacher": null}]}
</script>
<script>
"use strict";
//==================== Storage ====================
const LS_CARDS="eng_app_cards", LS_STATS="eng_app_stats";
const today=()=>new Date().toISOString().slice(0,10);
const load=(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch(e){return d}};
const save=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch(e){/* sandbox/Safari private mode: storage unavailable */}};

let cards=load(LS_CARDS,null);
let stats=load(LS_STATS,{log:{}});
const LS_SET="eng_app_settings";
let settings=load(LS_SET,{newPerDay:20,reviewPerDay:0,theme:"dark"});
function applyTheme(){document.documentElement.setAttribute("data-theme",settings.theme||"dark");}
applyTheme();

//==================== SRS (SM-2) ====================
function review(card,quality){
  const s=card.srs||(card.srs={easeFactor:2.5,interval:0,repetitions:0,dueDate:today()});
  if(quality>=3){
    if(s.repetitions===0) s.interval=1;
    else if(s.repetitions===1) s.interval=6;
    else s.interval=Math.round(s.interval*s.easeFactor);
    s.repetitions+=1;
  }else{
    s.repetitions=0; s.interval=1;
  }
  s.easeFactor=Math.max(1.3, s.easeFactor + (0.1-(5-quality)*(0.08+(5-quality)*0.02)));
  const d=new Date(); d.setDate(d.getDate()+s.interval);
  s.dueDate=d.toISOString().slice(0,10);
  // stats
  const t=today(); stats.log[t]=(stats.log[t]||0)+1; save(LS_STATS,stats);
}
const isDue=c=>!c.srs||c.srs.dueDate<=today();
const isMastered=c=>c.srs&&c.srs.repetitions>=3&&c.srs.interval>=21;

//==================== Views ====================
const views=["dashboard","study","manage","settings"];
function show(v){
  views.forEach(x=>{
    document.getElementById(x).classList.toggle("active",x===v);
  });
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.toggle("active",b.dataset.view===v));
  if(v==="dashboard") renderDashboard();
  if(v==="study") startStudy();
  if(v==="manage") renderList();
  if(v==="settings") renderSettings();
}
document.querySelectorAll(".nav-btn").forEach(b=>b.onclick=()=>show(b.dataset.view));

//==================== Dashboard ====================
function renderDashboard(){
  const has=Array.isArray(cards)&&cards.length>0;
  document.getElementById("no-data-panel").style.display=has?"none":"block";
  document.getElementById("start-btn").disabled=!has;
  const total=has?cards.length:0;
  const due=has?cards.filter(isDue).length:0;
  const mastered=has?cards.filter(isMastered).length:0;
  document.getElementById("s-due").textContent=due;
  document.getElementById("s-total").textContent=total;
  document.getElementById("s-mastered").textContent=mastered;
  const pct=total?Math.round(mastered/total*100):0;
  document.getElementById("mastery-bar").style.width=pct+"%";
  document.getElementById("mastery-text").textContent=total?`${mastered} / ${total} 枚が定着 (${pct}%)`:"カードを取り込んでください";
  // tag breakdown
  const tb=document.getElementById("tag-breakdown"); tb.innerHTML="";
  if(has){
    const byTag={};
    cards.forEach(c=>(c.tags||[]).forEach(t=>byTag[t]=(byTag[t]||0)+1));
    Object.entries(byTag).sort((a,b)=>b[1]-a[1]).forEach(([t,n])=>{
      const el=document.createElement("span"); el.className="chip"; el.textContent=`${t} · ${n}`; tb.appendChild(el);
    });
  }
}
document.getElementById("start-btn").onclick=()=>show("study");

//==================== Study ====================
let queue=[], qIdx=0, flipped=false;
function startStudy(){
  if(!Array.isArray(cards)||!cards.length){
    document.getElementById("study-area").innerHTML=`<div class="empty">カードがありません。「デッキ」タブから取り込んでください。</div>`;
    document.getElementById("study-progress").textContent="—"; return;
  }
  const shuffle=a=>{for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;};
  const due=cards.filter(isDue);
  // new card = never reviewed (repetitions 0 & interval 0)
  let news=shuffle(due.filter(c=>c.srs&&c.srs.repetitions===0&&c.srs.interval===0));
  let reviews=shuffle(due.filter(c=>!(c.srs&&c.srs.repetitions===0&&c.srs.interval===0)));
  const nLim=settings.newPerDay>0?settings.newPerDay:news.length;
  const rLim=settings.reviewPerDay>0?settings.reviewPerDay:reviews.length;
  queue=shuffle(news.slice(0,nLim).concat(reviews.slice(0,rLim)));
  qIdx=0; flipped=false;
  renderCard();
}
function renderCard(){
  const area=document.getElementById("study-area");
  const prog=document.getElementById("study-progress");
  if(qIdx>=queue.length){
    prog.textContent="";
    area.innerHTML=`<div class="done-box"><div class="emoji">🎉</div>
      <h2>今日の復習は完了です</h2>
      <p style="color:var(--muted)">${queue.length} 枚を復習しました。お疲れさまでした。</p>
      <button class="primary" onclick="show('dashboard')" style="max-width:260px;margin:10px auto 0">ホームに戻る</button></div>`;
    return;
  }
  const c=queue[qIdx];
  prog.textContent=`${qIdx+1} / ${queue.length}`;
  const tag=(c.tags||[]).slice(-1)[0]||"";
  if(!flipped){
    area.innerHTML=`<div class="card" id="card-el">
      <div class="badge">${tag}</div>
      <div class="front">${esc(c.front)}</div>
      <div class="hint">タップして答えを表示</div></div>`;
  }else{
    area.innerHTML=`<div class="card" id="card-el">
      <div class="badge">${tag}</div>
      <div class="front">${esc(c.front)}</div>
      <div class="divider"></div>
      <div class="back">${esc(c.back)}</div>
      ${c.example?`<div class="example">"${esc(c.example)}"</div>`:""}
      ${c.source?`<div class="src">${esc(c.source)}${c.teacher?" · "+esc(c.teacher):""}</div>`:""}
      </div>
      <div class="rate-row">
        <button class="rate again" data-q="0">Again<small>もう一度</small></button>
        <button class="rate hard" data-q="3">Hard<small>難しい</small></button>
        <button class="rate good" data-q="4">Good<small>普通</small></button>
        <button class="rate easy" data-q="5">Easy<small>簡単</small></button>
      </div>`;
    area.querySelectorAll(".rate").forEach(b=>b.onclick=()=>rate(+b.dataset.q));
  }
  const ce=document.getElementById("card-el");
  if(ce&&!flipped) ce.onclick=()=>{flipped=true;renderCard();};
}
function rate(q){
  review(queue[qIdx],q);
  save(LS_CARDS,cards);
  qIdx+=1; flipped=false; renderCard();
}

//==================== Manage / Import / Export ====================
function renderList(){
  const tb=document.getElementById("card-list");
  const empty=document.getElementById("list-empty");
  tb.innerHTML="";
  if(!Array.isArray(cards)||!cards.length){empty.style.display="block";return;}
  empty.style.display="none";
  cards.forEach(c=>{
    const tr=document.createElement("tr");
    tr.innerHTML=`<td>${esc(c.front)}</td><td>${esc(c.back)}</td>
      <td><span class="mini-chip">${c.srs?c.srs.dueDate:"-"}</span></td>
      <td><button class="btn danger" style="padding:4px 8px" data-id="${c.id}">削除</button></td>`;
    tb.appendChild(tr);
  });
  tb.querySelectorAll("button[data-id]").forEach(b=>b.onclick=()=>{
    cards=cards.filter(x=>x.id!==b.dataset.id); save(LS_CARDS,cards); renderList();
  });
}
function mergeImport(deck){
  const incoming=Array.isArray(deck)?deck:(deck.cards||[]);
  if(!incoming.length){alert("カードが見つかりませんでした");return;}
  if(!Array.isArray(cards)) cards=[];
  const byFront=new Map(cards.map(c=>[c.front.toLowerCase(),c]));
  let added=0;
  incoming.forEach(c=>{
    const k=(c.front||"").toLowerCase(); if(!k) return;
    if(byFront.has(k)) return;            // keep existing (preserves SRS progress)
    if(!c.srs) c.srs={easeFactor:2.5,interval:0,repetitions:0,dueDate:today()};
    if(!c.id) c.id=Math.random().toString(36).slice(2,14);
    cards.push(c); byFront.set(k,c); added++;
  });
  save(LS_CARDS,cards);
  alert(`${added} 枚を追加しました（重複 ${incoming.length-added} 枚はスキップ）。\n合計 ${cards.length} 枚。`);
  show("dashboard");
}
const fileInput=document.getElementById("file-input");
function triggerImport(){fileInput.click();}
document.getElementById("import-btn").onclick=triggerImport;
document.getElementById("import-btn2").onclick=triggerImport;
fileInput.onchange=e=>{
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=()=>{try{mergeImport(JSON.parse(r.result));}catch(err){alert("JSONの読み込みに失敗しました: "+err.message);}};
  r.readAsText(f); fileInput.value="";
};
document.getElementById("export-btn").onclick=()=>{
  const blob=new Blob([JSON.stringify({version:1,exportedAt:today(),cardCount:(cards||[]).length,cards:cards||[]},null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download=`english-srs-backup-${today()}.json`; a.click();
};
document.getElementById("reset-btn").onclick=()=>{
  if(!cards||!cards.length)return;
  if(!confirm("全カードの学習進捗をリセットします。よろしいですか？"))return;
  cards.forEach(c=>c.srs={easeFactor:2.5,interval:0,repetitions:0,dueDate:today()});
  save(LS_CARDS,cards); renderList(); alert("進捗をリセットしました。");
};

function renderSettings(){
  document.getElementById("set-new").value=settings.newPerDay;
  document.getElementById("set-review").value=settings.reviewPerDay;
  document.getElementById("set-theme").value=settings.theme||"dark";
}
function bindSettings(){
  const n=document.getElementById("set-new"), r=document.getElementById("set-review"), th=document.getElementById("set-theme");
  const upd=()=>{settings.newPerDay=Math.max(0,+n.value||0);settings.reviewPerDay=Math.max(0,+r.value||0);settings.theme=th.value;save(LS_SET,settings);applyTheme();};
  [n,r].forEach(el=>el.onchange=upd);
  th.onchange=upd;
}
bindSettings();
// keyboard shortcuts during study
document.addEventListener("keydown",e=>{
  if(!document.getElementById("study").classList.contains("active"))return;
  if(qIdx>=queue.length)return;
  if(!flipped){
    if(e.code==="Space"||e.code==="Enter"){e.preventDefault();flipped=true;renderCard();}
  }else{
    const map={"Digit1":0,"Digit2":3,"Digit3":4,"Digit4":5,"Numpad1":0,"Numpad2":3,"Numpad3":4,"Numpad4":5};
    if(e.code in map){e.preventDefault();rate(map[e.code]);}
  }
});
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));}
window.show=show;

//==================== Auto-load cards.json on first run ====================
function loadEmbedded(){
  try{
    const el=document.getElementById("embedded-cards");
    if(!el) return null;
    const deck=JSON.parse(el.textContent);
    const list=Array.isArray(deck)?deck:(deck.cards||[]);
    return list.length?list:null;
  }catch(e){return null;}
}
async function autoload(){
  if(Array.isArray(cards)&&cards.length){renderDashboard();return;}
  // 1) embedded data (works on file:// without any import)
  let list=loadEmbedded();
  // 2) fallback: fetch external data/cards.json (works on a server)
  if(!list){
    try{
      const res=await fetch("data/cards.json",{cache:"no-store"});
      if(res.ok){const deck=await res.json(); list=Array.isArray(deck)?deck:(deck.cards||[]);}
    }catch(e){/* file:// では fetch 不可 */}
  }
  if(list&&list.length){
    list.forEach(c=>{if(!c.srs)c.srs={easeFactor:2.5,interval:0,repetitions:0,dueDate:today()};});
    cards=list; save(LS_CARDS,cards);
  }
  renderDashboard();
}
autoload().catch(()=>{ try{ renderDashboard(); }catch(e){} });

// PWA: register service worker (only works over http/https, not file://)
if("serviceWorker" in navigator && location.protocol.startsWith("http")){
  window.addEventListener("load", ()=>{
    navigator.serviceWorker.register("service-worker.js").catch(()=>{/* ignore */});
  });
}
</script>
</body>
</html>
